name: Build & Publish Chrome Extension (Service Account)

on:
  push:
    branches: [ "master" ]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build --if-present

      - name: Zip extension
        run: |
          mkdir dist
          zip -r dist/extension.zip . -x "*.git*" "node_modules/*" ".github/*"

      - name: Write service account key
        run: |
          echo '${{ secrets.CWS_SERVICE_ACCOUNT_JSON }}' > service-account.json

      - name: Generate JWT Assertion
        id: jwt
        run: |
          python - << 'PY'
          import json, time, jwt, os
          sa = json.load(open('service-account.json'))
          now = int(time.time())
          payload = {
            'iss': sa['client_email'],
            'scope': 'https://www.googleapis.com/auth/chromewebstore',
            'aud': 'https://oauth2.googleapis.com/token',
            'iat': now,
            'exp': now + 3600,
          }
          assertion = jwt.encode(payload, sa['private_key'], algorithm='RS256')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'assertion={assertion}\n')
          PY

      - name: Get access token
        id: token
        run: |
          # Use a temporary file to store the response to avoid command substitution
          curl -s -X POST \
            -H "Content-Type: application/json" \
            https://oauth2.googleapis.com/token \
            -d "{
              \"grant_type\": \"urn:ietf:params:oauth:grant-type:jwt-bearer\",
              \"assertion\": \"${{ steps.jwt.outputs.assertion }}\"
            }" > token_response.json
          
          echo -n "token=" >> $GITHUB_OUTPUT
          jq -r '.access_token' token_response.json >> $GITHUB_OUTPUT

      - name: Upload new version
        run: |
          curl -X PUT \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Type: application/zip" \
            --data-binary @dist/extension.zip \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${{ secrets.EXTENSION_ID }}"

      - name: Publish
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -H "x-goog-api-version: 2" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${{ secrets.EXTENSION_ID }}/publish?publishTarget=default"
