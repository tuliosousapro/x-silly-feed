<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Silly Feed | Document Viewer</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@300;400;600;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #FAFAFA;
            --ink: #09090B;
            --accent: #EC4899;
            --yellow: #FACC15;
            --paper: #FDFCF8;
        }

        body {
            background-color: var(--bg);
            color: var(--ink);
            font-family: 'Nunito', sans-serif;
        }

        h1, h2, h3, h4 {
            font-family: 'Fredoka', sans-serif;
            letter-spacing: -0.01em;
        }

        .sketchy-text {
            font-family: 'Caveat', cursive;
        }

        .brutal-card {
            background: white;
            border: 4px solid var(--ink);
            box-shadow: 8px 8px 0px 0px var(--ink);
        }

        .brutal-btn {
            display: inline-flex;
            align-items: center;
            padding: 0.75rem 1.5rem;
            background-color: var(--yellow);
            border: 4px solid var(--ink);
            box-shadow: 4px 4px 0px 0px var(--ink);
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.1s ease;
            cursor: pointer;
        }

        .brutal-btn:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px 0px var(--ink);
        }

        .paper-texture {
            background-image: url('https://www.transparenttextures.com/patterns/paper.png');
            background-repeat: repeat;
        }

        /* Customize prose for neubrutalism */
        .prose h1, .prose h2, .prose h3 {
            text-transform: uppercase;
            font-family: 'Fredoka', sans-serif;
            border-bottom: 4px solid var(--ink);
            padding-bottom: 0.5rem;
        }
        .prose strong {
            color: var(--accent);
            font-weight: 900;
        }
    </style>
</head>
<body class="paper-texture">
    <!-- Top Bar -->
    <div class="border-b-4 border-black bg-white p-2 text-center text-xs font-black uppercase tracking-widest">
        <a href="index.html" class="hover:underline">← Return to Main Page</a> — The Daily Silly — Established 2026
    </div>

    <div class="max-w-4xl mx-auto px-4 py-8 md:py-16">
        <header class="mb-12 text-center">
            <h1 id="doc-title" class="text-5xl md:text-7xl font-black uppercase mb-4">Loading...</h1>
            <div class="h-2 w-24 bg-accent mx-auto"></div>
        </header>

        <main id="markdown-container" class="brutal-card p-8 md:p-12 bg-white relative overflow-hidden">
            <div id="loading" class="text-center py-20">
                <i data-lucide="loader-2" class="w-12 h-12 animate-spin mx-auto text-accent"></i>
                <p class="mt-4 font-black uppercase tracking-widest">Fetching Silly Document...</p>
            </div>
            <div id="content" class="prose prose-lg max-w-none hidden">
                <!-- Rendered Markdown goes here -->
            </div>
            <div id="error" class="hidden text-center py-20">
                <i data-lucide="alert-circle" class="w-16 h-16 mx-auto text-red-500 mb-4"></i>
                <h2 class="text-3xl font-black uppercase mb-2">Wait, what?</h2>
                <p class="font-bold">The news reporter couldn't find this document. Is the internet broken?</p>
                <a href="index.html" class="brutal-btn mt-8">Go Back Home</a>
            </div>
        </main>

        <footer class="mt-12 text-center">
            <div class="sketchy-text text-2xl text-accent opacity-50">
                Wait, there's more!
            </div>
        </footer>
    </div>

    <script>
        lucide.createIcons();

        async function fetchMarkdown() {
            const urlParams = new URLSearchParams(window.location.search);
            const doc = urlParams.get('doc');
            
            if (!doc) {
                showError();
                return;
            }

            const docTitle = doc.charAt(0).toUpperCase() + doc.slice(1).toLowerCase();
            document.getElementById('doc-title').innerText = docTitle;
            document.title = `X Silly Feed | ${docTitle}`;

            try {
                const response = await fetch(rawUrl);
                if (!response.ok) throw new Error('Failed to fetch');
                
                const markdown = await response.text();
                const contentDiv = document.getElementById('content');
                contentDiv.innerHTML = marked.parse(markdown);
                
                document.getElementById('loading').classList.add('hidden');
                contentDiv.classList.remove('hidden');
                lucide.createIcons();
            } catch (err) {
                console.error(err);
                showError();
            }
        }

        function showError() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('doc-title').innerText = "Not Found";
            document.getElementById('error').classList.remove('hidden');
        }

        fetchMarkdown();
    </script>
</body>
</html>
